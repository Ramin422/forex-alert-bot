services:
  - type: worker          # เปลี่ยนจาก web เป็น worker
    name: forex-alert-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python price_fetcher.py
    envVars:
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: TRADINGVIEW_SECRET
        sync: false